<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜谱详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-2xl mx-auto bg-white min-h-screen">
    <div id="loading" class="p-10 text-center">加载中...</div>
    <div id="content" class="hidden">
      <img id="coverImg" src="" class="w-full h-60 object-cover bg-gray-200" loading="lazy">
      <div class="p-5">
        <h1 id="title" class="text-2xl font-bold"></h1>
        <p id="desc" class="text-gray-500 mt-2"></p>

        <div class="flex gap-4 mt-3 text-sm text-gray-600">
          <span>⏱️ <span id="time"></span> 分钟</span>
          <span>📊 难度：<span id="diff"></span></span>
        </div>

        <div class="mt-6">
          <h3 class="text-lg font-semibold border-l-4 border-green-500 pl-2">食材清单</h3>
          <ul id="ingList" class="mt-3 space-y-2"></ul>
        </div>

        <div class="mt-6">
          <h3 class="text-lg font-semibold border-l-4 border-green-500 pl-2">烹饪步骤</h3>
          <div id="stepList" class="mt-3 space-y-4"></div>
        </div>

        <div class="mt-8 flex gap-3">
          <a id="editBtn" href="" class="flex-1 bg-green-600 text-white text-center py-2 rounded-lg">编辑菜谱</a>
          <a href="index.html" class="flex-1 bg-gray-200 text-center py-2 rounded-lg">返回列表</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://cjptowfejvdchopcsjzx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcHRvd2ZlanZkY2hvcGNzanp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjE3ODIsImV4cCI6MjA5Mzc5Nzc4Mn0.DHhS17dTRnBnzrzHhY6yyzGSUzqk2O7dlUc8lq9UmVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function getQuery(name) {
      let p = new URLSearchParams(location.search);
      return p.get(name);
    }

    async function loadDetail() {
      let id = getQuery("id");
      if (!id) return;

      const {data} = await sb
        .from("recipes")
        .select("*")
        .eq("id", id)
        .single();

      document.getElementById("loading").classList.add("hidden");
      document.getElementById("content").classList.remove("hidden");

      document.getElementById("coverImg").src = data.cover_img || "https://picsum.photos/800/400";
      document.getElementById("title").innerText = data.title;
      document.getElementById("desc").innerText = data.description || "暂无简介";
      document.getElementById("time").innerText = data.cook_time || 10;
      document.getElementById("diff").innerText = data.difficulty || "普通";

      let ing = data.ingredients || [];
      let ingHtml = "";
      ing.forEach(item => {
        ingHtml += `<li class="flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4">
          <span>${item}</span>
        </li>`;
      });
      document.getElementById("ingList").innerHTML = ingHtml;

      let step = data.steps || [];
      let stepHtml = "";
      step.forEach((item, idx) => {
        stepHtml += `<div class="flex gap-3">
          <span class="w-6 h-6 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-sm font-bold">${idx+1}</span>
          <span>${item}</span>
        </div>`;
      });
      document.getElementById("stepList").innerHTML = stepHtml;

      document.getElementById("editBtn").href = `edit.html?id=${id}`;
    }

    sb.channel("recipe-change")
      .on("postgres_changes", {event:"*", schema:"public", table:"recipes"}, ()=>{
        loadDetail();
      })
      .subscribe();

    loadDetail();
  </script>
</body>
</html>
