<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的家庭食谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-xl font-bold">🍳 家庭食谱</h1>
      <a href="edit.html" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">+ 新增菜谱</a>
    </div>

    <div id="recipeList" class="grid gap-4">
      加载中...
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://cjptowfejvdchopcsjzx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcHRvd2ZlanZkY2hvcGNzanp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjE3ODIsImV4cCI6MjA5Mzc5Nzc4Mn0.DHhS17dTRnBnzrzHhY6yyzGSUzqk2O7dlUc8lq9UmVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 加载所有食谱
    async function loadRecipes() {
      const { data, error } = await sb.from("recipes").select("*").order("id", { ascending: false });
      if (error) {
        document.getElementById("recipeList").innerHTML = "加载失败";
        return;
      }
      renderList(data);
    }

    // 渲染列表
    function renderList(list) {
      const container = document.getElementById("recipeList");
      if (!list.length) {
        container.innerHTML = "<div class='text-center text-gray-500 py-10'>暂无食谱，快去添加吧～</div>";
        return;
      }

      container.innerHTML = list.map(item => `
        <div class="bg-white rounded-xl shadow p-4">
          ${item.cover_img ? `<img src="${item.cover_img}" class="w-full h-40 object-cover rounded-lg mb-3">` : ''}
          <h3 class="font-bold text-lg mb-1">${item.title}</h3>
          <p class="text-sm text-gray-500 mb-2">${item.description || '无描述'}</p>
          <div class="text-xs text-gray-400 flex gap-2 mb-3">
            <span>⏱ ${item.cook_time} 分钟</span>
            <span>📊 ${item.difficulty}</span>
          </div>
          <div class="flex gap-2 text-sm">
            <a href="edit.html?id=${item.id}" class="flex-1 bg-blue-600 text-white text-center py-1.5 rounded">编辑</a>
            <button onclick="del(${item.id})" class="flex-1 bg-red-600 text-white py-1.5 rounded">删除</button>
          </div>
        </div>
      `).join('');
    }

    // 删除
    async function del(id) {
      if (!confirm("确定要删除吗？")) return;
      await sb.from("recipes").delete().eq("id", id);
      loadRecipes();
    }

    loadRecipes();
  </script>
</body>
</html>
