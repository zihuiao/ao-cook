<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凹蛋的食谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-xl font-bold">🍳 凹蛋的食谱</h1>
      <a href="edit.html" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">+ 新增菜谱</a>
    </div>

    <div class="flex flex-wrap gap-2 mb-5" id="categoryButtons">
      <button data-cat="all" class="px-3 py-1.5 rounded bg-green-600 text-white text-sm">全部</button>
      <button data-cat="猪肉" class="px-3 py-1.5 rounded bg-gray-200 text-sm">猪肉</button>
      <button data-cat="牛肉" class="px-3 py-1.5 rounded bg-gray-200 text-sm">牛肉</button>
      <button data-cat="鸡肉" class="px-3 py-1.5 rounded bg-gray-200 text-sm">鸡肉</button>
      <button data-cat="虾" class="px-3 py-1.5 rounded bg-gray-200 text-sm">虾</button>
      <button data-cat="蔬菜" class="px-3 py-1.5 rounded bg-gray-200 text-sm">蔬菜</button>
      <button data-cat="其他海鲜" class="px-3 py-1.5 rounded bg-gray-200 text-sm">其他海鲜</button>
      <button data-cat="其他" class="px-3 py-1.5 rounded bg-gray-200 text-sm">其他</button>
    </div>

    <div id="recipeList" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-4">
      加载中...
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://cjptowfejvdchopcsjzx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcHRvd2ZlanZkY2hvcGNzanp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjE3ODIsImV4cCI6MjA5Mzc5Nzc4Mn0.DHhS17dTRnBnzrzHhY6yyzGSUzqk2O7dlUc8lq9UmVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allRecipes = [];
    let currentCategory = "all";

    async function loadRecipes() {
      const { data, error } = await sb
        .from("recipes")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        document.getElementById("recipeList").innerHTML = "加载失败";
        return;
      }
      allRecipes = data || [];
      renderList();
    }

    function renderList() {
      const container = document.getElementById("recipeList");
      let list = allRecipes;
      if (currentCategory !== "all") {
        list = list.filter(item => item.category === currentCategory);
      }

      if (!list.length) {
        container.innerHTML = "<div class='col-span-2 text-center text-gray-500 py-10'>暂无该分类菜谱</div>";
        return;
      }

      container.innerHTML = list.map(item => `
        <div class="bg-white rounded-xl shadow overflow-hidden">
          ${item.cover_img ? `<img src="${item.cover_img}?_t=${Date.now()}" class="w-full h-32 object-cover">` : '<div class="w-full h-32 bg-gray-100"></div>'}
          <div class="p-3">
            <div class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded inline-block">${item.category}</div>
            <h3 class="font-bold text-sm mt-1">${item.title}</h3>
            <a href="edit.html?id=${item.id}" class="block text-center text-xs bg-blue-600 text-white py-1 rounded mt-2">编辑</a>
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll("#categoryButtons button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#categoryButtons button").forEach(b => {
          b.classList.remove("bg-green-600");
          b.classList.add("bg-gray-200");
        });
        btn.classList.remove("bg-gray-200");
        btn.classList.add("bg-green-600");
        currentCategory = btn.dataset.cat;
        renderList();
      });
    });

    loadRecipes();
  </script>
</body>
</html>
