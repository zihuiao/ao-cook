<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 强制禁止浏览器缓存 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>家庭共享食谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-green-700">🍽️ 家庭共享食谱</h1>
      <a href="edit.html" class="bg-green-600 text-white px-4 py-2 rounded-lg">+ 添加菜谱</a>
    </div>

    <div id="recipeList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <p class="text-center py-10 text-gray-500">加载中...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://cjptowfejvdchopcsjzx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcHRvd2ZlanZkY2hvcGNzanp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjE3ODIsImV4cCI6MjA5Mzc5Nzc4Mn0.DHhS17dTRnBnzrzHhY6yyzGSUzqk2O7dlUc8lq9UmVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 每张图片强制加随机戳，彻底断缓存
    function getFreshImgUrl(url) {
      if(!url) return 'https://picsum.photos/400/300';
      const rand = Math.random().toString(36);
      return url + (url.includes('?') ? '&' : '?') + '_nocache=' + rand;
    }

    async function loadRecipes() {
      const { data, error } = await sb
        .from('recipes')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('recipeList').innerHTML = '<p class="text-red-500 text-center">加载失败</p>';
        return;
      }

      if (!data.length) {
        document.getElementById('recipeList').innerHTML = '<p class="text-center py-10 text-gray-500">暂无菜谱</p>';
        return;
      }

      let html = '';
      data.forEach(item => {
        let imgUrl = getFreshImgUrl(item.cover_img);
        html += `
          <a href="detail.html?id=${item.id}&_r=${Math.random()}" class="block bg-white rounded-xl shadow overflow-hidden">
            <img src="${imgUrl}" class="w-full h-48 object-cover">
            <div class="p-4">
              <h2 class="text-lg font-bold">${item.title}</h2>
              <p class="text-sm text-gray-500 mt-1 line-clamp-2">${item.description || '暂无简介'}</p>
              <div class="mt-2 text-sm text-gray-600">
                ⏱️ ${item.cook_time || 10} 分钟 &nbsp;|&nbsp; 难度：${item.difficulty || '简单'}
              </div>
            </div>
          </a>
        `;
      });

      document.getElementById('recipeList').innerHTML = html;
    }

    // 页面每次显示都重新拉取，不读缓存
    loadRecipes();
    document.addEventListener('visibilitychange', ()=>{
      if(!document.hidden) loadRecipes();
    });
  </script>
</body>
</html>
