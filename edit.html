<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑菜谱 - 凹蛋的食谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-2xl mx-auto bg-white p-5 min-h-screen">
    <h1 class="text-xl font-bold mb-6" id="pageTitle">新增菜谱</h1>

    <form id="recipeForm">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">菜谱名称</label>
        <input type="text" id="title" class="w-full border rounded-lg px-3 py-2" required>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">简介描述</label>
        <textarea id="description" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">食材分类</label>
        <select id="category" class="w-full border rounded-lg px-3 py-2">
          <option value="猪肉">猪肉</option>
          <option value="牛肉">牛肉</option>
          <option value="鸡肉">鸡肉</option>
          <option value="虾">虾</option>
          <option value="蔬菜">蔬菜</option>
          <option value="其他海鲜">其他海鲜</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium mb-1">烹饪时长</label>
          <input type="number" id="cook_time" class="w-full border rounded-lg px-3 py-2" value="10" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">难度</label>
          <select id="difficulty" class="w-full border rounded-lg px-3 py-2">
            <option>简单</option>
            <option>中等</option>
            <option>困难</option>
          </select>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">菜谱图片</label>
        <input type="file" id="imageFile" accept="image/jpeg,image/jpg,image/png" class="w-full border rounded-lg px-3 py-2">
        <div id="previewBox" class="mt-2 hidden">
          <img id="previewImg" class="h-32 object-cover rounded-lg border">
        </div>
        <input type="hidden" id="cover_img">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">食材清单</label>
        <textarea id="ingredients" rows="4" class="w-full border rounded-lg px-3 py-2"></textarea>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium mb-1">烹饪步骤</label>
        <textarea id="steps" rows="6" class="w-full border rounded-lg px-3 py-2"></textarea>
      </div>

      <input type="hidden" id="editId">
      <div class="flex gap-3 mb-3">
        <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-lg">保存提交</button>
        <a href="index.html" class="flex-1 bg-gray-200 text-center py-2 rounded-lg">取消返回</a>
      </div>
      <button type="button" id="deleteBtn" class="w-full bg-red-600 text-white py-2 rounded-lg hidden">🗑️ 删除此菜谱</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://cjptowfejvdchopcsjzx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcHRvd2ZlanZkY2hvcGNzanp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjE3ODIsImV4cCI6MjA5Mzc5Nzc4Mn0.DHhS17dTRnBnzrzHhY6yyzGSUzqk2O7dlUc8lq9UmVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function getQuery(name) {
      return new URLSearchParams(location.search).get(name);
    }
    function textToArray(str) {
      return str.split('\n').map(i => i.trim()).filter(Boolean);
    }

    // 图片上传（不变）
    async function upload(file) {
      const name = `img_${Date.now()}.jpg`;
      await sb.storage.from("recipe-images").upload(name, file, {upsert:true});
      const { data } = sb.storage.from("recipe-images").getPublicUrl(name);
      return data.publicUrl;
    }

    document.getElementById('imageFile').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('previewBox').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
      document.getElementById('cover_img').value = await upload(file);
    });

    // 加载编辑数据
    async function loadEdit() {
      const id = getQuery('id');
      if (!id) return;
      document.getElementById('pageTitle').innerText = "编辑菜谱";
      document.getElementById('editId').value = id;
      document.getElementById('deleteBtn').classList.remove('hidden');

      const { data } = await sb.from('recipes').select('*').eq('id', id).single();
      document.getElementById('title').value = data.title;
      document.getElementById('description').value = data.description || '';
      document.getElementById('category').value = data.category;
      document.getElementById('cook_time').value = data.cook_time;
      document.getElementById('difficulty').value = data.difficulty;
      document.getElementById('ingredients').value = Array.isArray(data.ingredients) ? data.ingredients.join('\n') : '';
      document.getElementById('steps').value = Array.isArray(data.steps) ? data.steps.join('\n') : '';

      if (data.cover_img) {
        document.getElementById('cover_img').value = data.cover_img;
        document.getElementById('previewImg').src = data.cover_img;
        document.getElementById('previewBox').classList.remove('hidden');
      }
    }

    // 提交：强制打印日志，确认 category 真的发出去了
    document.getElementById('recipeForm').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('editId').value;

      const formData = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        cook_time: parseInt(document.getElementById('cook_time').value),
        difficulty: document.getElementById('difficulty').value,
        cover_img: document.getElementById('cover_img').value,
        ingredients: textToArray(document.getElementById('ingredients').value),
        steps: textToArray(document.getElementById('steps').value),
      };

      console.log("提交的数据：", formData); // 看这里有没有正确的 category

      let res;
      if (id) {
        res = await sb.from('recipes').update(formData).eq('id', id);
      } else {
        res = await sb.from('recipes').insert([formData]);
      }

      console.log("更新结果：", res); // 看这里报不报错

      // 强制清缓存跳转
      location.href = "index.html?_t=" + Date.now();
    });

    // 删除
    document.getElementById('deleteBtn').onclick = async () => {
      const id = document.getElementById('editId').value;
      if (!confirm('确定删除？')) return;
      await sb.from('recipes').delete().eq('id', id);
      location.href = "index.html?_t=" + Date.now();
    };

    loadEdit();
  </script>
</body>
</html>
