<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增/编辑菜谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="max-w-2xl mx-auto bg-white p-5 min-h-screen">
    <h1 class="text-xl font-bold mb-6" id="pageTitle">新增菜谱</h1>

    <form id="recipeForm">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">菜谱名称</label>
        <input type="text" id="title" class="w-full border rounded-lg px-3 py-2" placeholder="输入菜名" required>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">简介描述</label>
        <textarea id="description" rows="2" class="w-full border rounded-lg px-3 py-2" placeholder="简单介绍口味、特点"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium mb-1">烹饪时长(分钟)</label>
          <input type="number" id="cook_time" class="w-full border rounded-lg px-3 py-2" value="10" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">难度</label>
          <select id="difficulty" class="w-full border rounded-lg px-3 py-2">
            <option>简单</option>
            <option>中等</option>
            <option>困难</option>
          </select>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">菜谱图片</label>
        <input type="file" id="imageFile" accept="image/*" class="w-full border rounded-lg px-3 py-2">
        <div id="previewBox" class="mt-2 hidden">
          <img id="previewImg" src="" class="h-32 object-cover rounded-lg border">
        </div>
        <input type="hidden" id="cover_img">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">食材清单（每行一条）</label>
        <textarea id="ingredients" rows="4" class="w-full border rounded-lg px-3 py-2" placeholder="番茄 2个&#10;鸡蛋 3个"></textarea>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium mb-1">烹饪步骤（每行一步）</label>
        <textarea id="steps" rows="6" class="w-full border rounded-lg px-3 py-2" placeholder="鸡蛋打散炒熟盛出&#10;番茄下锅炒出汁"></textarea>
      </div>

      <input type="hidden" id="editId">
      <div class="flex gap-3">
        <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-lg">保存提交</button>
        <a href="index.html" class="flex-1 bg-gray-200 text-center py-2 rounded-lg">取消返回</a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://cjptowfejvdchopcsjzx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcHRvd2ZlanZkY2hvcGNzanp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjE3ODIsImV4cCI6MjA5Mzc5Nzc4Mn0.DHhS17dTRnBnzrzHhY6yyzGSUzqk2O7dlUc8lq9UmVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function getQuery(name) {
      let p = new URLSearchParams(location.search);
      return p.get(name);
    }
    function textToArray(str) {
      return str.split('\n').map(i => i.trim()).filter(Boolean);
    }
    function arrayToText(arr) {
      return Array.isArray(arr) ? arr.join('\n') : '';
    }

    // 手机图片修复 + 压缩
    function fixImage(file) {
      return new Promise(resolve => {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(blob => {
            const f = new File([blob], `recipe_${Date.now()}.jpg`, { type: 'image/jpeg' });
            resolve(f);
          }, 'image/jpeg', 0.8);
        };
      });
    }

    // 上传图片
    async function upload(file) {
      if (!file) return '';
      const img = await fixImage(file);
      const name = `img_${Date.now()}.jpg`;
      await sb.storage.from('recipe-images').upload(name, img, { upsert: true });
      const { data } = sb.storage.from('recipe-images').getPublicUrl(name);
      return data.publicUrl + '?t=' + Date.now();
    }

    // 选择图片预览 + 自动上传
    document.getElementById('imageFile').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;

      // 预览
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('previewBox').classList.remove('hidden');
      };
      reader.readAsDataURL(file);

      // 上传
      try {
        const url = await upload(file);
        document.getElementById('cover_img').value = url;
        alert("✅ 图片上传成功");
      } catch (err) {
        alert("❌ 上传失败：" + err.message);
      }
    });

    // 编辑回显
    async function loadEdit() {
      const id = getQuery('id');
      if (!id) return;
      document.getElementById('pageTitle').textContent = '编辑菜谱';
      document.getElementById('editId').value = id;

      const { data } = await sb.from('recipes').select('*').eq('id', id).single();
      document.getElementById('title').value = data.title || '';
      document.getElementById('description').value = data.description || '';
      document.getElementById('cook_time').value = data.cook_time || 10;
      document.getElementById('difficulty').value = data.difficulty || '简单';
      document.getElementById('ingredients').value = arrayToText(data.ingredients);
      document.getElementById('steps').value = arrayToText(data.steps);

      if (data.cover_img) {
        const url = data.cover_img + '&t=' + Date.now();
        document.getElementById('cover_img').value = url;
        document.getElementById('previewImg').src = url;
        document.getElementById('previewBox').classList.remove('hidden');
      }
    }

    // 提交保存
    document.getElementById('recipeForm').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        cook_time: +document.getElementById('cook_time').value,
        difficulty: document.getElementById('difficulty').value,
        cover_img: document.getElementById('cover_img').value,
        ingredients: textToArray(document.getElementById('ingredients').value),
        steps: textToArray(document.getElementById('steps').value),
      };

      if (id) {
        await sb.from('recipes').update(data).eq('id', id);
      } else {
        await sb.from('recipes').insert([data]);
      }

      location.href = 'index.html?t=' + Math.random();
    });

    loadEdit();
  </script>
</body>
</html>
